name: Publish release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag de la release existante (ex. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:win
      - run: npm run smoke:webbluetooth
      - run: npm run smoke:webbluetooth:packaged
      - name: Attacher les binaires a la release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          $assets = @(
            (Get-ChildItem 'release/Klixa-Companion-Setup-*.exe').FullName
            (Get-ChildItem 'release/Klixa-Companion-Setup-*.exe.blockmap').FullName
            (Resolve-Path 'release/latest.yml').Path
          )
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assets --clobber
          } else {
            gh release create $env:RELEASE_TAG @assets --title "Klixa Companion $env:RELEASE_TAG" --generate-notes --draft
          }
