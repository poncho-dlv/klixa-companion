name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v6
        with:
          name: klixa-companion-windows-unsigned
          path: |
            release/Klixa-Companion-Setup-*.exe
            release/Klixa-Companion-Setup-*.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14
