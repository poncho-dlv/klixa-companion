services:
  companion:
    build: .
    container_name: klixa-companion
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    env_file: .env
    # Le port local n'est utile que pour le pilotage/test depuis le LAN.
    # La liaison cloud est sortante et n'a besoin d'aucun port exposé.
    ports:
      - "8786:8786"
